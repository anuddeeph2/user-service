# GitHub Actions CI - user-service
# GitHub -> Actions -> Build & Test -> SonarQube -> JFrog -> CloudBees Unify
#
# Modeled on veinte-por-diez/.github/workflows/frontend-ci.yml, adapted for a
# Java/Maven service and a JFrog Artifactory registry instead of GHCR/Docker Hub.
#
# SETUP REQUIRED before this workflow goes green (see plan doc / PR description):
#   Repo secrets: JFROG_URL, JFROG_USER, JFROG_TOKEN, SONAR_HOST_URL, SONAR_TOKEN
#   Create the 'user-service' project in SonarQube and in CloudBees Unify (component ID).
#   Confirm whether cloudbees-io-gha/register-build-artifact needs an explicit auth secret
#   beyond the CloudBees GitHub App install on this org.

name: User Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  workflow_dispatch: {}

jobs:
  build-test-scan:
    name: Build, Test, SonarQube, Push to JFrog
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history improves SonarQube analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & Test
        run: mvn -B clean package

      - name: SonarQube Analysis
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=user-service \
            -Dsonar.projectName="User Service" \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=false || true

      # TODO: verify what publishes the SonarQube SARIF into Unify Security Center from
      # GitHub Actions (no equivalent of the Jenkins exportSonarQubeScan/registerSecurityScan
      # steps has been confirmed yet). Placeholder curl call using the same direct-API
      # pattern as the Jenkins side's unifyApiClient.groovy fallback:
      # - name: Publish SonarQube SARIF to Unify
      #   run: |
      #     curl -sf -X POST "${{ secrets.UNIFY_API_URL }}/security-scans" \
      #       -H "Authorization: Bearer ${{ secrets.UNIFY_API_TOKEN }}" \
      #       -H "Content-Type: application/json" \
      #       -d @sonarqube-user-service.sarif.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JFrog Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.JFROG_URL }}
          username: ${{ secrets.JFROG_USER }}
          password: ${{ secrets.JFROG_TOKEN }}

      - name: Build and Push Docker Image to JFrog
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.JFROG_URL }}/fitness-tracker-docker/user-service:${{ github.sha }}
            ${{ secrets.JFROG_URL }}/fitness-tracker-docker/user-service:latest

      - name: Register build artifact in CloudBees Unify
        uses: cloudbees-io-gha/register-build-artifact@v3
        with:
          name: user-service
          version: ${{ github.sha }}
          url: https://${{ secrets.JFROG_URL }}/ui/repos/tree/General/fitness-tracker-docker/user-service
          type: Docker
          commit: ${{ github.sha }}
          ref: ${{ github.ref }}
          repository-url: https://github.com/${{ github.repository }}

  # ─────────────────────────────────────────────────────────────────
  # EXPERIMENTAL — Trivy / Grype container scans.
  # Not yet validated end-to-end (SARIF shape + Unify registration
  # unconfirmed). Runs as its own job with continue-on-error so it
  # never blocks the main build/push job above.
  # ─────────────────────────────────────────────────────────────────
  container-scan-experimental:
    name: Container Scan (Trivy + Grype) [experimental]
    needs: build-test-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trivy scan (experimental)
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: ${{ secrets.JFROG_URL }}/fitness-tracker-docker/user-service:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - name: Grype scan (experimental)
        uses: anchore/scan-action@v4
        continue-on-error: true
        id: grype
        with:
          image: ${{ secrets.JFROG_URL }}/fitness-tracker-docker/user-service:${{ github.sha }}
          output-format: sarif

      # TODO: once validated, register these SARIF files with Unify the same way
      # SonarQube results are registered (see TODO above) with scanner: 'Trivy' / 'Grype'.
